plugins {
    id 'com.github.johnrengelman.shadow'
}

architectury {
    platformSetupLoomIde()
    fabric()
}

loom {
    accessWidenerPath = project(":common").loom.accessWidenerPath

    mixin {
        useLegacyMixinAp = true
    }
}

configurations {
    common {
        canBeResolved = true
        canBeConsumed = false
    }
    compileClasspath.extendsFrom common
    runtimeClasspath.extendsFrom common
    developmentFabric.extendsFrom common

    // Files in this configuration will be bundled into your mod using the Shadow plugin.
    // Don't use the `shadow` configuration from the plugin itself as it's meant for excluding files.
    shadowBundle {
        canBeResolved = true
        canBeConsumed = false
    }
}

dependencies {
    include(implementation(annotationProcessor("com.github.bawnorton.mixinsquared:mixinsquared-fabric:0.2.0")))

    modImplementation "net.fabricmc:fabric-loader:$rootProject.fabric_loader_version"
    modImplementation "net.fabricmc.fabric-api:fabric-api:$rootProject.fabric_api_version"

    common(project(path: ':common', configuration: 'namedElements')) { transitive false }
    shadowBundle project(path: ':common', configuration: 'transformProductionFabric')

    /* APIs */
    modLocalRuntime 'maven.modrinth:architectury-api:15.0.3+fabric'
    modLocalRuntime("me.shedaniel.cloth:cloth-config-fabric:17.0.144") {
        exclude(group: "net.fabricmc.fabric-api")
    }
    modLocalRuntime("io.wispforest:owo-lib:0.12.20+1.21.4") {
        exclude(group: "net.fabricmc.fabric-api")
    }
    modLocalRuntime 'maven.modrinth:modmenu:13.0.3'
    modLocalRuntime 'maven.modrinth:fabric-permissions-api:0.3.3'

    /* Performance */
    modLocalRuntime "maven.modrinth:sodium:mc1.21.4-0.6.13-fabric"
    modCompileOnly 'maven.modrinth:iris:1.8.8+1.21.4-fabric'
    modLocalRuntime 'maven.modrinth:iris:1.8.8+1.21.4-fabric'
    localRuntime "org.antlr:antlr4-runtime:4.13.1"
    localRuntime "io.github.douira:glsl-transformer:2.0.1"
    localRuntime "org.anarres:jcpp:1.4.14"
    modLocalRuntime 'maven.modrinth:scalablelux:0.1.2+beta.1+fabric.6d46f24'
    modLocalRuntime 'maven.modrinth:spark:1.10.121-fabric'

    /* Particle Rain/Pretty Rain */
    modLocalRuntime "maven.modrinth:particle-rain:3.3.3"
    modLocalRuntime("dev.isxander:yet-another-config-lib:3.6.6+1.21.4-fabric"){
        exclude(group: "net.fabricmc.fabric-api")
    }
//    modLocalRuntime "maven.modrinth:pretty-rain:TGjK6ChS"

    /* Effectual */
    modLocalRuntime 'maven.modrinth:effectual:0.7.0-1.21.4'

    /* Mmmmmmmmmmmm */
//    modLocalRuntime 'maven.modrinth:mmmmmmmmmmmm:1.20-2.0.5'

    /* Create */
    // 6.0.0
//    modLocalRuntime("com.simibubi.create:create-${minecraft_version}:${create_version}") { transitive = false }
//    modLocalRuntime("net.createmod.ponder:Ponder-Fabric-${minecraft_version}:${ponder_version}")
//    modLocalRuntime("dev.engine-room.flywheel:flywheel-forge-api-${minecraft_version}:${flywheel_version}")
//    modLocalRuntime("com.tterrag.registrate:Registrate:${registrate_version}")
    // 0.5.0
//    modLocalRuntime("com.simibubi.create:create-fabric-1.20.1:0.5.1-j-build.1631+mc1.20.1")

    /* Lodestone */
//    modLocalRuntime "maven.modrinth:lodestonelib:1.21.1-1.7.0.5-fabric" // no 1.21.4 version

    /* Effective */
//    modLocalRuntime "maven.modrinth:effective:2.4.8-1.21.1" // no 1.21.4 version
//    modLocalRuntime fileTree(dir: '../libs', include: 'effective-1.0.2-all.jar')

    /* Hex Casting */
//    modLocalRuntime "at.petra-k.hexcasting:hexcasting-fabric-1.20.1:0.11.2-pre-715"

    /* Tombstone */
//    modLocalRuntime fileTree(dir: '../libs', include: 'tombstone-1.20.1-8.9.0.jar')

    /* Particular */
    modLocalRuntime "maven.modrinth:particular:1.1.1+1.21.4"

    /* Particle Core */
    modLocalRuntime "maven.modrinth:particle-core:0.2.5+1.21.4"
    modLocalRuntime "maven.modrinth:fzzy-config:0.6.8+1.21.3"
    modLocalRuntime("me.fallenbreath:conditional-mixin-fabric:0.6.2")
    modLocalRuntime("net.fabricmc:fabric-language-kotlin:1.13.2+kotlin.2.1.20") {
        exclude(group: "net.fabricmc.fabric-api")
    }

    /* A Good Place */
    modCompileOnly "maven.modrinth:a-good-place:kD90q4La" // 1.2.10
    modLocalRuntime "maven.modrinth:a-good-place:kD90q4La" // 1.2.10

    /* Physics Mod */
    modCompileOnly fileTree(dir: '../libs', include: 'physics-mod-pro-v174c-fabric-1.21.4.jar')
//    modLocalRuntime fileTree(dir: '../libs', include: 'physics-mod-pro-v174c-fabric-1.21.4.jar')

    /* Subtle Effects */
    localRuntime "net.peanuuutz.tomlkt:tomlkt:0.3.7"
    modLocalRuntime "maven.modrinth:subtle-effects:NA1rBYFJ" // fabric 1.9.4-hf.1

    /* What Are They Up To */
//    modCompileOnly "maven.modrinth:what-are-they-up-to:K1Qp2Cga" // 1.2.5
//    modLocalRuntime "maven.modrinth:what-are-they-up-to:K1Qp2Cga" // 1.2.5
}

processResources {
    inputs.property 'version', project.version

    filesMatching('fabric.mod.json') {
        expand version: project.version
    }
}

shadowJar {
    configurations = [project.configurations.shadowBundle]
    archiveClassifier = 'dev-shadow'
}

remapJar {
    inputFile.set shadowJar.archiveFile
}

runClient {
    sourceSets {
        main {
            resources {
                srcDirs += "../common/src/main/resources"
            }
        }
    }
}
