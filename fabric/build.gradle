plugins {
    id 'com.github.johnrengelman.shadow'
}

architectury {
    platformSetupLoomIde()
    fabric()
}

loom {
    accessWidenerPath = project(":common").loom.accessWidenerPath
}

configurations {
    common {
        canBeResolved = true
        canBeConsumed = false
    }
    compileClasspath.extendsFrom common
    runtimeClasspath.extendsFrom common
    developmentFabric.extendsFrom common

    // Files in this configuration will be bundled into your mod using the Shadow plugin.
    // Don't use the `shadow` configuration from the plugin itself as it's meant for excluding files.
    shadowBundle {
        canBeResolved = true
        canBeConsumed = false
    }
}

dependencies {
    include(implementation(annotationProcessor("com.github.bawnorton.mixinsquared:mixinsquared-fabric:0.3.4")))

    modImplementation "net.fabricmc:fabric-loader:$rootProject.fabric_loader_version"
    modImplementation "net.fabricmc.fabric-api:fabric-api:$rootProject.fabric_api_version"

    common(project(path: ':common', configuration: 'namedElements')) { transitive false }
    shadowBundle project(path: ':common', configuration: 'transformProductionFabric')
    common(project(path: ':common_legacy_mod_compat', configuration: 'namedElements')) { transitive false }
    shadowBundle project(path: ':common_legacy_mod_compat', configuration: 'transformProductionFabric')

    modCompileOnly 'maven.modrinth:modmenu:7.2.2'
    modLocalRuntime 'maven.modrinth:modmenu:7.2.2'
    modLocalRuntime 'maven.modrinth:architectury-api:9.2.14+fabric'
    modLocalRuntime("me.shedaniel.cloth:cloth-config-fabric:11.1.136") {
        exclude(group: "net.fabricmc.fabric-api")
    }
    modCompileOnly("me.shedaniel.cloth:cloth-config-fabric:11.1.136") {
        exclude(group: "net.fabricmc.fabric-api")
    }

    if (rootProject.vulkan_enabled == 'true'){
        modLocalRuntime 'maven.modrinth:vulkanmod:0.5.2'
        localRuntime("org.lwjgl:lwjgl-glfw:3.3.3")
        localRuntime("org.lwjgl:lwjgl-vulkan:3.3.3")
        localRuntime("org.lwjgl:lwjgl-vma:3.3.3")
        localRuntime("org.lwjgl:lwjgl-shaderc:3.3.3")
        localRuntime("org.lwjgl:lwjgl-vma:3.3.3:natives-windows")
        localRuntime("org.lwjgl:lwjgl-shaderc:3.3.3:natives-windows")
        return
    }

    /* APIs */
    modLocalRuntime 'maven.modrinth:owo-lib:0.11.2+1.20'
    modLocalRuntime "dev.isxander:yet-another-config-lib:3.6.6+1.20.1-fabric"

    /* Performance */
    modLocalRuntime "maven.modrinth:spark:1.10.53-fabric"
    modLocalRuntime "maven.modrinth:sodium:mc1.20.1-0.5.13-fabric"
    modLocalRuntime 'maven.modrinth:iris:1.7.6+1.20.1'
    if (rootProject.physics_enabled != 'true'){
        modLocalRuntime 'maven.modrinth:starlight:1.1.2+1.20'
    }
    localRuntime "org.antlr:antlr4-runtime:4.13.1"
    localRuntime "io.github.douira:glsl-transformer:2.0.1"
    localRuntime "org.anarres:jcpp:1.4.14"
    modLocalRuntime "maven.modrinth:indium:1.0.36+mc1.20.1"
    modCompileOnly 'maven.modrinth:lithium:mc1.20.1-0.11.3-fabric'
    modLocalRuntime 'maven.modrinth:lithium:mc1.20.1-0.11.3-fabric'

    modCompileOnly "maven.modrinth:sodium:mc1.20.1-0.5.13-fabric"
    modCompileOnly 'maven.modrinth:iris:1.7.6+1.20.1'
    /* Valkyrien Skies */
    modLocalRuntime "net.fabricmc:fabric-language-kotlin:1.13.1+kotlin.2.1.10"
    modLocalRuntime "maven.modrinth:valkyrien-skies:1.20.1-fabric-2.3.0-beta.9"
    modLocalRuntime 'maven.modrinth:eureka:1.20.1-fabric-1.5.1-beta.3'

    modCompileOnly "net.fabricmc:fabric-language-kotlin:1.13.1+kotlin.2.1.10"
    modCompileOnly "maven.modrinth:valkyrien-skies:1.20.1-fabric-2.3.0-beta.9"
    modCompileOnly 'maven.modrinth:eureka:1.20.1-fabric-1.5.1-beta.3'

    /* Create */
    modLocalRuntime("com.simibubi.create:create-fabric-1.20.1:0.5.1-j-build.1631+mc1.20.1")
//    modLocalRuntime 'maven.modrinth:iris-flw-compat:1.1.4'
    // keep this line to compile properly
    // 否则被模组重写的原版方法不会正确重映射...
    modCompileOnly("com.simibubi.create:create-fabric-1.20.1:0.5.1-j-build.1631+mc1.20.1")

    /* Physics Mod */
    modCompileOnly "maven.modrinth:physicsmod:3.0.14"
    if (rootProject.physics_enabled == 'true'){
        modLocalRuntime "maven.modrinth:physicsmod:3.0.14"
        return
    }

    /* Particle Rain/Pretty Rain */
    modCompileOnly "maven.modrinth:particle-rain:3.0.6-1.20"
    modCompileOnly "maven.modrinth:particle-rain:v4-beta.1+1.20.1-fabric"
    modLocalRuntime "maven.modrinth:particle-rain:v4-beta.1+1.20.1-fabric"

    /* Mmmmmmmmmmmm */
//    modLocalRuntime 'maven.modrinth:mmmmmmmmmmmm:1.20-2.0.5'
//    modLocalRuntime "maven.modrinth:moonlight:fabric_1.20-2.13.62"

    /* Effectual */
//    modLocalRuntime 'maven.modrinth:effectual:0.6.0-1.20.1'
    modCompileOnly 'maven.modrinth:effectual:0.6.0-1.20.1'

    /* Effective */
//    modLocalRuntime "maven.modrinth:effective:2.3.2-1.20.1" // dependency hell

    modCompileOnly "maven.modrinth:effective:2.3.2-1.20.1"

    /* Particular */
//    modLocalRuntime "maven.modrinth:particular:1.1.1"
    modLocalRuntime "maven.modrinth:sushi-bar:0.2.2+1.20"

    modCompileOnly "maven.modrinth:particular:1.1.1"

    /* Particle Core */
    modLocalRuntime "maven.modrinth:particle-core:0.2.5+1.20.1"
    modLocalRuntime "maven.modrinth:fzzy-config:0.7.2+1.20.1"
    modLocalRuntime "me.fallenbreath:conditional-mixin:0.5.1"

    /* Subtle Effects */
    localRuntime "net.peanuuutz.tomlkt:tomlkt:0.3.7"
    modLocalRuntime "maven.modrinth:subtle-effects:mRWsAYqN" // fabric 1.12.1

    /* A Good Place */
    modLocalRuntime "maven.modrinth:a-good-place:1.20-1.2.7"
    modCompileOnly "maven.modrinth:a-good-place:1.20-1.2.7"

    /* Carpet */
//    modLocalRuntime "curse.maven:carpet-349239:4573334" // 1.4.112

    /* Observable */
    modLocalRuntime "maven.modrinth:observable:4.4.2+fabric"

    /* What Are They Up To */
    modLocalRuntime "maven.modrinth:coroutil:7tRnsYkP" // 1.3.7
    modCompileOnly "maven.modrinth:what-are-they-up-to:1.20.1-1.2.3"
    modLocalRuntime "maven.modrinth:what-are-they-up-to:1.20.1-1.2.3"
    modLocalRuntime "maven.modrinth:forge-config-api-port:v8.0.2-1.20.1-Fabric"

    /* More Culling */
    modLocalRuntime "maven.modrinth:moreculling:0.24.0"

    /* Real Camera */
//    modLocalRuntime "maven.modrinth:real-camera:XZ9lHrLr"
}

processResources {
    inputs.property 'version', project.version

    filesMatching('fabric.mod.json') {
        expand version: project.version
    }
}

shadowJar {
    configurations = [project.configurations.shadowBundle]
    archiveClassifier = 'dev-shadow'
}

remapJar {
    input.set shadowJar.archiveFile
}

runClient {
    sourceSets {
        main {
            resources {
                srcDirs += "../common/src/main/resources"
                srcDirs += "../common_legacy_mod_compat/src/main/resources"
            }
        }
    }
}
